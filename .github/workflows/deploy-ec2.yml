name: Deploy To EC2

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
      branch:
        description: Branch to deploy (optional override)
        required: false
        type: string

jobs:
  deploy-staging:
    if:
      github.ref_name == 'staging' || (github.event_name == 'workflow_dispatch'
      && github.event.inputs.target == 'staging')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Deploy staging over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_PATH }}"
            DEPLOY_BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || 'staging' }}"
            if [[ -z "$DEPLOY_BRANCH" ]]; then DEPLOY_BRANCH="staging"; fi
            bash ./devops/deploy/ec2-deploy.sh staging "$DEPLOY_BRANCH"

  deploy-production:
    if:
      github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_PATH }}"
            DEPLOY_BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || 'main' }}"
            if [[ -z "$DEPLOY_BRANCH" ]]; then DEPLOY_BRANCH="main"; fi
            bash ./devops/deploy/ec2-deploy.sh production "$DEPLOY_BRANCH"
